<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Heatmap des déplacements par pièce</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    body {
      background: #f5f0e8;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px;
    }

    h1 { font-weight: normal; font-size: 1.8rem; margin-bottom: 28px; }

    .layout { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

    /* Étiquettes de rangées (1–8) et de colonnes (a–h) */
    .rank-labels { display: flex; flex-direction: column; margin-right: 5px; }
    .rank-label  { width: 14px; height: 56px; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: #aaa; font-family: monospace; }
    .file-labels { display: flex; margin-top: 5px; margin-left: 19px; }
    .file-label  { width: 56px; text-align: center; font-size: .6rem; color: #aaa; font-family: monospace; }

    /* Cases de l'échiquier */
    .sq-light { fill: #f0d9b5; }
    .sq-dark  { fill: #b58863; }

    /* Glyphes des pièces */
    .piece { font-size: 30px; dominant-baseline: central; text-anchor: middle; cursor: pointer; user-select: none; }

    /* Cercles heatmap — seul le rayon encode la fréquence */
    .dot { fill: #922b21; opacity: .75; pointer-events: none; }

    /* Panneau latéral */
    .panel { display: flex; flex-direction: column; gap: 14px; width: 210px; font-family: monospace; }
    .card  { background: #ede8df; border: 1px solid #ccc5b5; padding: 14px; }
    .card h3 { font-size: .6rem; text-transform: uppercase; letter-spacing: .12em; color: #999; margin-bottom: 10px; font-weight: normal; }

    /* Sélecteur blancs / noirs */
    .toggle { display: flex; border: 1px solid #ccc; overflow: hidden; }
    .tbtn {
      flex: 1; padding: 8px 0; border: none; background: transparent;
      font-family: monospace; font-size: .7rem; color: #aaa; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .tbtn.active { background: #2a2520; color: #f5f0e8; }
    .tbtn:not(.active):hover { background: #ddd; }

    #info { font-size: .8rem; color: #2a2520; line-height: 1.8; }

    /* Légende taille des cercles */
    .legend { display: flex; align-items: flex-end; gap: 14px; margin-top: 8px; }
    .legend-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .legend-dot  { background: #922b21; border-radius: 50%; opacity: .75; }
    .legend-lbl  { font-size: .55rem; color: #aaa; }

    /* Top 5 des cases (masqué au départ) */
    #top-panel { display: none; }
    #top-list  { list-style: none; }
    #top-list li { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #ddd; font-size: .7rem; }
    #top-list li:last-child { border-bottom: none; }
    .sq-name  { color: #2a2520; }
    .sq-count { color: #922b21; }

    #status { font-size: .62rem; color: #bbb; margin-top: 8px; font-family: monospace; }
  </style>
</head>
<body>

<h1>Heatmap des déplacements par pièce</h1>

<div class="layout">

  <!-- Échiquier -->
  <div>
    <div style="display:flex">
      <div class="rank-labels" id="rank-labels"></div>
      <svg id="board" width="448" height="448"></svg>
    </div>
    <div class="file-labels" id="file-labels"></div>
    <p id="status">Chargement des parties...</p>
  </div>

  <!-- Panneau de contrôle -->
  <div class="panel">

    <div class="card">
      <h3>Lorsque je joue les</h3>
      <div class="toggle">
        <button class="tbtn active" data-side="w">♙ Blancs</button>
        <button class="tbtn"        data-side="b">♟ Noirs</button>
      </div>
    </div>

    <div class="card">
      <h3>Pièce considérée</h3>
      <div id="info">Clique sur une pièce</div>
    </div>

    <div class="card">
      <h3>Légende</h3>
      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="width:7px;height:7px"></div>
          <span class="legend-lbl">Rare</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="width:16px;height:16px"></div>
          <span class="legend-lbl">Moyen</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="width:26px;height:26px"></div>
          <span class="legend-lbl">Fréquent</span>
        </div>
      </div>
    </div>

    <div class="card" id="top-panel">
      <h3>Top 5 cases visitées</h3>
      <ul id="top-list"></ul>
    </div>

  </div>
</div>

<script>

  // ── Constantes ────────────────────────────────────────────────
  const SQ    = 56;  // taille d'une case en pixels
  const FILES = ['a','b','c','d','e','f','g','h'];
  const RANKS = ['1','2','3','4','5','6','7','8'];

  // Libellé affiché dans le panneau (sans mention de la couleur)
  const PIECE_LABEL = {
    p: 'Pions', n: 'Cavaliers', b: 'Fous', r: 'Tours', q: 'Dame', k: 'Roi'
  };


  // ── Disposition initiale des pièces ───────────────────────────
  // t = type de pièce (p/n/b/r/q/k)
  // c = couleur de la pièce (w = blanc, b = noir)
  // g = glyphe Unicode affiché sur l'échiquier
  // col / row = position 0-indexée depuis a1 (col 0 = colonne a, row 0 = rangée 1)
  const PIECES = [
    {t:'r',c:'w',g:'♖',col:0,row:0}, {t:'n',c:'w',g:'♘',col:1,row:0},
    {t:'b',c:'w',g:'♗',col:2,row:0}, {t:'q',c:'w',g:'♕',col:3,row:0},
    {t:'k',c:'w',g:'♔',col:4,row:0}, {t:'b',c:'w',g:'♗',col:5,row:0},
    {t:'n',c:'w',g:'♘',col:6,row:0}, {t:'r',c:'w',g:'♖',col:7,row:0},
    {t:'p',c:'w',g:'♙',col:0,row:1}, {t:'p',c:'w',g:'♙',col:1,row:1},
    {t:'p',c:'w',g:'♙',col:2,row:1}, {t:'p',c:'w',g:'♙',col:3,row:1},
    {t:'p',c:'w',g:'♙',col:4,row:1}, {t:'p',c:'w',g:'♙',col:5,row:1},
    {t:'p',c:'w',g:'♙',col:6,row:1}, {t:'p',c:'w',g:'♙',col:7,row:1},
    {t:'p',c:'b',g:'♟',col:0,row:6}, {t:'p',c:'b',g:'♟',col:1,row:6},
    {t:'p',c:'b',g:'♟',col:2,row:6}, {t:'p',c:'b',g:'♟',col:3,row:6},
    {t:'p',c:'b',g:'♟',col:4,row:6}, {t:'p',c:'b',g:'♟',col:5,row:6},
    {t:'p',c:'b',g:'♟',col:6,row:6}, {t:'p',c:'b',g:'♟',col:7,row:6},
    {t:'r',c:'b',g:'♜',col:0,row:7}, {t:'n',c:'b',g:'♞',col:1,row:7},
    {t:'b',c:'b',g:'♝',col:2,row:7}, {t:'q',c:'b',g:'♛',col:3,row:7},
    {t:'k',c:'b',g:'♚',col:4,row:7}, {t:'b',c:'b',g:'♝',col:5,row:7},
    {t:'n',c:'b',g:'♞',col:6,row:7}, {t:'r',c:'b',g:'♜',col:7,row:7},
  ];


  // ── Structure des données ─────────────────────────────────────
  // heatData[typePièce][couleurPièce][côtéJoué] = tableau de 64 entiers
  // L'index d'une case est calculé comme : (rang - 1) * 8 + colonne
  // soit a1 = 0, b1 = 1, ..., h8 = 63
  const heatData = {};
  for (const t of 'pnbrqk') {
    heatData[t] = {};
    for (const c of 'wb')
      heatData[t][c] = { w: new Array(64).fill(0), b: new Array(64).fill(0) };
  }

  function sqToIdx(sq) {
    return (parseInt(sq[1]) - 1) * 8 + (sq.charCodeAt(0) - 97);
  }


  // ── Parsing des coups (notation SAN) ──────────────────────────
  // On incrémente la case de destination pour chaque coup joué.
  // Le roque est traité à part car il déplace deux pièces simultanément.
  function parseMoves(moves, userSide) {
    moves.forEach((move, i) => {

      const pc = i % 2 === 0 ? 'w' : 'b';  // les blancs jouent les coups pairs

      // Petit roque
      if (move === 'O-O') {
        heatData.k[pc][userSide][sqToIdx(pc === 'w' ? 'g1' : 'g8')]++;
        heatData.r[pc][userSide][sqToIdx(pc === 'w' ? 'f1' : 'f8')]++;
        return;
      }

      // Grand roque
      if (move === 'O-O-O') {
        heatData.k[pc][userSide][sqToIdx(pc === 'w' ? 'c1' : 'c8')]++;
        heatData.r[pc][userSide][sqToIdx(pc === 'w' ? 'd1' : 'd8')]++;
        return;
      }

      // Coup normal : identifier la pièce (majuscule = pièce, sinon pion)
      let pt = 'p', rest = move;
      if (/^[NBRQK]/.test(move)) { pt = move[0].toLowerCase(); rest = move.slice(1); }

      // Nettoyer la notation : retirer capture (x), échec (+#), promotion (=X)
      // La case de destination est toujours les 2 derniers caractères
      const dest = rest.replace(/[x+#]/g, '').replace(/=[NBRQ]/, '').slice(-2);
      if (/^[a-h][1-8]$/.test(dest))
        heatData[pt][pc][userSide][sqToIdx(dest)]++;
    });
  }


  // ── Construction du SVG ───────────────────────────────────────

  // Étiquettes de rangées (8 → 1 de haut en bas)
  const rlEl = document.getElementById('rank-labels');
  for (let r = 7; r >= 0; r--) {
    const el = document.createElement('div');
    el.className = 'rank-label';
    el.textContent = RANKS[r];
    rlEl.appendChild(el);
  }

  // Étiquettes de colonnes (a → h)
  FILES.forEach(f => {
    const el = document.createElement('div');
    el.className = 'file-label';
    el.textContent = f;
    document.getElementById('file-labels').appendChild(el);
  });

  const svg = d3.select('#board');

  // Les 64 cases
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++)
      svg.append('rect')
        .attr('x', c * SQ).attr('y', (7 - r) * SQ)
        .attr('width', SQ).attr('height', SQ)
        .attr('class', (r + c) % 2 === 1 ? 'sq-light' : 'sq-dark');

  // Un cercle par case, invisibles au départ (r = 0)
  const dots = [];
  for (let i = 0; i < 64; i++)
    dots.push(svg.append('circle').attr('class', 'dot')
      .attr('cx', (i % 8) * SQ + SQ / 2)
      .attr('cy', (7 - Math.floor(i / 8)) * SQ + SQ / 2)
      .attr('r', 0));

  // Les pièces avec leur rectangle de sélection (invisible par défaut)
  const pieceEls = [];
  PIECES.forEach(p => {
    const g    = svg.append('g').style('cursor', 'pointer');
    const rect = g.append('rect')
      .attr('x', p.col * SQ + 1).attr('y', (7 - p.row) * SQ + 1)
      .attr('width', SQ - 2).attr('height', SQ - 2).attr('rx', 3)
      .attr('fill', 'transparent').attr('stroke', 'none');
    g.append('text').attr('class', 'piece')
      .attr('x', p.col * SQ + SQ / 2)
      .attr('y', (7 - p.row) * SQ + SQ / 2 + 1)
      .text(p.g);
    g.on('click', () => onPieceClick(p));
    pieceEls.push({ rect, p });
  });


  // ── Interactions ──────────────────────────────────────────────
  let selected = null;  // pièce sélectionnée { t, c }
  let userSide = 'w';   // côté joué par l'utilisateur

  function onPieceClick(p) {
    // Deuxième clic sur le même type → déselectionner
    if (selected && selected.t === p.t && selected.c === p.c) {
      deselect(); return;
    }

    // Effacer les bordures précédentes
    pieceEls.forEach(e => e.rect.attr('stroke', 'none').attr('fill', 'transparent'));
    selected = p;

    // Surligner toutes les pièces du même type (ex : les deux cavaliers blancs)
    pieceEls.forEach(e => {
      if (e.p.t === p.t && e.p.c === p.c)
        e.rect.attr('stroke', '#922b21').attr('stroke-width', 2).attr('fill', 'rgba(146,43,33,.12)');
    });

    document.getElementById('info').textContent = PIECE_LABEL[p.t];
    drawHeatmap();
  }

  function deselect() {
    pieceEls.forEach(e => e.rect.attr('stroke', 'none').attr('fill', 'transparent'));
    selected = null;
    dots.forEach(d => d.transition().duration(150).attr('r', 0));
    document.getElementById('info').textContent = 'Clique sur une pièce';
    document.getElementById('top-panel').style.display = 'none';
  }

  function drawHeatmap() {
    if (!selected) return;
    const data = heatData[selected.t][selected.c][userSide];
    const max  = d3.max(data);
    if (!max) return;

    // Échelle racine carrée : évite que les cases très fréquentes
    // n'écrasent visuellement les cases moyennement visitées
    const rScale = d3.scaleSqrt().domain([0, max]).range([0, SQ * 0.42]);
    dots.forEach((d, i) => d.transition().duration(200).attr('r', rScale(data[i] || 0)));

    // Top 5 des cases les plus visitées
    const top5 = data
      .map((v, i) => ({ sq: FILES[i % 8] + RANKS[Math.floor(i / 8)], v }))
      .filter(d => d.v > 0).sort((a, b) => b.v - a.v).slice(0, 5);

    document.getElementById('top-list').innerHTML = top5
      .map(d => `<li><span class="sq-name">${d.sq}</span><span class="sq-count">${d.v.toLocaleString()}</span></li>`)
      .join('');
    document.getElementById('top-panel').style.display = 'block';
  }

  // Basculer entre jouer les blancs et les noirs
  document.querySelectorAll('.tbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      userSide = btn.dataset.side;
      drawHeatmap();
    });
  });


  // ── Chargement des données ────────────────────────────────────
  // Le CSV est lu avec d3.dsv (séparateur point-virgule).
  // Pour chaque partie, on extrait les coups depuis la colonne PGN
  // et on les passe à parseMoves pour alimenter heatData.
  d3.dsv(';', 'data/Dataset-Échecs.csv').then(rows => {
    rows.forEach(row => {
      if (!row.pgn) return;
      const side  = row.userColor === 'white' ? 'w' : 'b';
      const moves = row.pgn
        .replace(/\[[^\]]*\]/g, '')          // retirer les en-têtes [...]
        .replace(/\{[^}]*\}/g, '')           // retirer les annotations {...}
        .replace(/\d+\.+/g, '')              // retirer les numéros de coups
        .replace(/1-0|0-1|1\/2-1\/2|\*/g, '')
        .trim().split(/\s+/).filter(m => m.length > 0);
      parseMoves(moves, side);
    });
    document.getElementById('status').textContent =
      rows.length.toLocaleString() + ' parties analysées';
  });

</script>
</body>
</html>
